<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentinel Earn - Community Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Monetag SDKs -->
    <script src='//libtl.com/sdk.js' data-zone='10555746' data-sdk='show_10555746'></script>
    <script src='//libtl.com/sdk.js' data-zone='10555727' data-sdk='show_10555727'></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f172a, #064e3b); color: white; min-height: 100vh; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-tab.active { color: #10b981; border-bottom: 2px solid #10b981; }
        #task-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: black; }
        .reload-trigger { position: absolute; inset: 0; z-index: 110; cursor: pointer; background: rgba(0,0,0,0.01); }
        .cooldown-lock { pointer-events: none; opacity: 0.5; }
        iframe { width: 100%; height: 100%; border: none; }
        .hide { display: none !important; }
    </style>
</head>
<body class="pb-20">

    <!-- Top Header -->
    <header class="p-4 glass sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 id="userBar" class="font-bold text-green-400 text-sm">👤 Loading...</h1>
            <p id="balance-header" class="text-xs font-mono text-gray-300">0.00000 USDT</p>
        </div>
        <div class="flex items-center gap-3">
            <input type="color" id="themePicker" class="w-6 h-6 rounded-full bg-transparent border-none">
            <button onclick="openAdmin()" class="opacity-30 hover:opacity-100"><i class="fas fa-user-shield"></i></button>
        </div>
    </header>

    <!-- Main Content Tabs -->
    <main id="tab-tasks" class="p-4">
        <div class="glass rounded-3xl p-6 text-center mb-6">
            <p class="text-[10px] uppercase text-gray-400">Total Balance</p>
            <h2 class="text-4xl font-black font-mono my-1" id="main-balance">0.00000</h2>
            <div class="flex gap-2 mt-4">

                <button onclick="openModal('withdraw')" class="flex-1 bg-green-600 py-2 rounded-xl font-bold text-sm">Withdraw</button>
                <button onclick="copyInvite()" class="flex-1 bg-blue-600 py-2 rounded-xl font-bold text-sm">Invite</button>
            </div>
        </div>
        
        <h3 class="font-bold mb-3 flex justify-between">
            <span>Available Links</span>
            <span class="text-xs text-gray-400">Min: 0.02 USDT</span>
        </h3>
        <div id="task-grid" class="grid grid-cols-2 gap-3"></div>
    </main>

    <!-- Leaderboard Tab -->
    <main id="tab-leaderboard" class="p-4 hide">
        <h2 class="text-xl font-bold mb-4"><i class="fas fa-trophy text-yellow-500 mr-2"></i>Top 100 Earners</h2>
        <div id="leaderboard-list" class="space-y-2"></div>
    </main>

    <!-- Chat Tab -->
    <main id="tab-chat" class="p-4 hide flex flex-col h-[75vh]">
        <h2 class="text-xl font-bold mb-4">Global Chat</h2>
        <div id="chat-box" class="flex-1 glass rounded-2xl p-4 overflow-y-auto space-y-3 mb-4 text-sm"></div>
        <div class="flex gap-2">
            <input type="text" id="chat-input" placeholder="Type message..." class="flex-1 bg-white/10 rounded-xl p-3 outline-none border border-white/10 text-sm">
            <button onclick="sendMessage()" class="bg-blue-600 px-6 rounded-xl"><i class="fas fa-paper-plane"></i></button>
        </div>
    </main>

    <!-- Navigation Bar -->
    <nav class="fixed bottom-0 inset-x-0 glass flex justify-around p-3 z-50 border-t border-white/10">
        <button onclick="switchTab('tasks')" id="nav-tasks" class="nav-tab active flex flex-col items-center"><i class="fas fa-tasks"></i><span class="text-[10px]">Tasks</span></button>
        <button onclick="switchTab('leaderboard')" id="nav-leaderboard" class="nav-tab flex flex-col items-center"><i class="fas fa-chart-line"></i><span class="text-[10px]">Top 100</span></button>
        <button onclick="switchTab('chat')" id="nav-chat" class="nav-tab flex flex-col items-center"><i class="fas fa-comments"></i><span class="text-[10px]">Chat</span></button>
    </nav>

    <!-- TASK OVERLAY -->
    <div id="task-overlay">
        <!-- Overlay disappears after 4 reloads so ads become clickable -->
        <div id="reload-trigger" class="reload-trigger" onclick="manualReload()"></div>
        
        <div class="absolute top-0 inset-x-0 glass p-4 z-[120] text-center">
            <div class="flex justify-between items-center mb-2">
                <span id="reload-count-ui" class="text-xs font-bold text-blue-400">Tap Website: 0/4</span>
                <button onclick="closeTask()" class="text-2xl">&times;</button>
            </div>
            <div class="w-full bg-gray-800 h-1 rounded-full"><div id="task-progress" class="bg-blue-500 h-full w-0 transition-all"></div></div>
            <p id="cooldown-text" class="text-xs text-red-500 font-bold mt-2 hidden">COOLDOWN 8s</p>
        </div>

        <div class="absolute right-4 bottom-32 z-[130]">
            <button id="gift-btn" onclick="giftTask()" class="w-14 h-14 bg-yellow-500 rounded-full shadow-2xl flex items-center justify-center border-2 border-white animate-bounce">
                <i class="fas fa-gift text-xl text-red-600"></i>
            </button>
            <p id="gift-ui" class="text-[9px] text-center mt-1">Gifts: 0/4</p>
        </div>

        <iframe id="task-iframe"></iframe>
        <button id="claim-btn" onclick="claimTask()" class="absolute bottom-10 inset-x-10 bg-green-600 py-4 rounded-2xl font-bold text-xl hidden z-[140]">CL

AIM REWARD</button>
    </div>

    <!-- WITHDRAW MODAL -->
    <div id="withdraw-modal" class="fixed inset-0 bg-black/90 hidden z-[200] p-8 flex items-center justify-center">
        <div class="glass w-full p-6 rounded-3xl">
            <h3 class="text-xl font-bold mb-4">Withdraw USDT</h3>
            <select id="wd-method" class="w-full bg-white/10 p-3 rounded-xl mb-4"><option>GCash</option><option>PayPal</option><option>FaucetPay</option></select>
            <input type="text" id="wd-address" placeholder="Address/Number" class="w-full bg-white/10 p-3 rounded-xl mb-4 outline-none">
            <input type="number" id="wd-amount" placeholder="Amount (Min 0.02)" class="w-full bg-white/10 p-3 rounded-xl mb-6 outline-none">
            <button onclick="submitWithdraw()" class="w-full bg-green-600 py-3 rounded-xl font-bold">Request</button>
            <button onclick="closeModal('withdraw')" class="w-full mt-2 text-gray-500 text-sm">Cancel</button>
        </div>
    </div>

    <!-- ADMIN MODAL -->
    <div id="admin-modal" class="fixed inset-0 bg-slate-950 hidden z-[300] p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Admin</h2>
            <button onclick="closeModal('admin')" class="text-2xl">&times;</button>
        </div>
        <div id="admin-login-ui">
            <input type="password" id="admin-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-xl mb-4">
            <button onclick="adminLogin()" class="w-full bg-blue-600 py-3 rounded-xl">Login</button>
        </div>
        <div id="admin-dashboard" class="hidden">
            <h3 class="text-yellow-500 mb-4">Withdrawal Requests</h3>
            <div id="admin-wd-list" class="space-y-4"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
